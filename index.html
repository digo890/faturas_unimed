<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguros Unimed · Portal do Cliente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/fill/style.css">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-subtle);
      color: var(--fg-1);
      font-family: var(--font-family-system);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--color-primary);
      height: 60px;
      display: flex; align-items: center;
      padding: 0 32px;
      gap: 24px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo {
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .topbar-logo img { height: 40px; width: auto; display: block; }
    .topbar-spacer { flex: 1; }
    .topbar-actions {
      display: flex; align-items: center; gap: 4px;
    }
    .topbar-icon {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
      border: none; background: transparent;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
      font-size: 20px;
    }
    .topbar-icon:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .topbar-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.2);
      margin: 0 8px;
    }
    .topbar-user {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      padding: 4px 8px 4px 4px;
      border-radius: 24px;
      border: none; background: transparent;
      transition: background 150ms ease;
      color: #fff;
    }
    .topbar-user:hover { background: rgba(255,255,255,0.12); }
    .topbar-user .name {
      font-size: 14px; font-weight: 500; color: #fff;
    }
    .topbar-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff;
      flex-shrink: 0;
    }

    /* ── CONTENT ── */
    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    /* ── BANNER ── */
    .banner {
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 40px;
      line-height: 0;
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── ACESSO RÁPIDO ── */
    .section-heading {
      font-size: 22px;
      font-weight: 600;
      color: var(--color-neutral-900);
      margin: 0 0 20px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .quick-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px 20px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
      cursor: default;
      border: 2px solid transparent;
      transition: background 150ms ease, border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
      text-decoration: none;
    }
    .quick-card:hover {
      background: var(--color-primary-surface);
      border-color: var(--color-primary);
      box-shadow: 0 4px 12px rgba(0,45,116,0.10);
      transform: translateY(-2px);
    }
    .quick-card.primary {
      background: var(--color-primary);
      cursor: pointer;
    }
    .quick-card.primary:hover {
      background: #003a96;
      border-color: transparent;
      box-shadow: 0 6px 20px rgba(0,45,116,0.30);
    }

    .quick-card .card-icon {
      font-size: 22px;
      color: var(--color-primary);
      line-height: 1;
    }
    .quick-card.primary .card-icon { color: rgba(255,255,255,0.85); }

    .quick-card .card-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-neutral-900);
      line-height: 1.3;
      margin-top: 24px;
    }
    .quick-card.primary .card-label { color: #fff; }

    /* ── LOADING STATE ── */
    .quick-card.primary.loading {
      cursor: wait;
      pointer-events: none;
      justify-content: center;
      gap: 12px;
    }
    .quick-card.primary.loading:hover {
      background: var(--color-primary);
      box-shadow: none;
      transform: none;
    }

    .loading-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 700ms linear infinite;
      flex-shrink: 0;
    }
    .quick-card.loading .loading-spinner { display: block; }
    .quick-card.loading .card-icon { display: none; }
    .quick-card.loading .card-label { display: none; }

    .loading-body {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .quick-card.loading .loading-body { display: flex; }

    .loading-msg {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
      min-height: 34px;
      display: flex; align-items: center; justify-content: center;
      animation: fadein 300ms ease;
    }

    .loading-dots {
      display: flex; gap: 5px;
    }
    .loading-dots span {
      width: 5px; height: 5px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    @media (max-width: 960px) {
      .quick-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 20px 16px 48px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar" role="banner">
    <div class="topbar-logo">
      <img src="assets/acesso_rapido/logo-seg-unimed.png" alt="Seguros Unimed">
    </div>
    <div class="topbar-spacer"></div>
    <nav class="topbar-actions" aria-label="Ações do cabeçalho">
      <button class="topbar-icon" aria-label="Idioma"><i class="ph ph-globe"></i></button>
      <button class="topbar-icon" aria-label="Telefone"><i class="ph ph-phone"></i></button>
      <button class="topbar-icon" aria-label="Documentos"><i class="ph ph-newspaper"></i></button>
      <button class="topbar-icon" aria-label="Notificações"><i class="ph ph-bell"></i></button>
      <div class="topbar-divider" role="separator"></div>
      <button class="topbar-user" aria-label="Menu do usuário">
        <div class="topbar-avatar">LS</div>
        <span class="name">Lucas</span>
      </button>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- BANNER -->
    <div class="banner">
      <img src="assets/acesso_rapido/banner.jpg" alt="Quem tem Seguros Unimed, tá seguro. 35 anos cuidando de tudo o que importa para você.">
    </div>

    <!-- ACESSO RÁPIDO -->
    <section aria-label="Acesso rápido">
      <h2 class="section-heading">Acesso rápido</h2>
      <div class="quick-grid">

        <a id="card-financeiro" href="Faturas.html" class="quick-card primary" aria-label="Financeiro">
          <i class="ph ph-currency-circle-dollar card-icon"></i>
          <span class="card-label">Financeiro</span>
          <div class="loading-body">
            <div class="loading-spinner"></div>
            <span class="loading-msg"></span>
            <div class="loading-dots"><span></span><span></span><span></span></div>
          </div>
        </a>

        <div class="quick-card" aria-label="Documentos digitais">
          <i class="ph ph-copy card-icon"></i>
          <span class="card-label">Documentos digitais</span>
        </div>

        <div class="quick-card" aria-label="Informe de quitações">
          <i class="ph ph-file-text card-icon"></i>
          <span class="card-label">Informe de quitações</span>
        </div>

        <div class="quick-card" aria-label="Informe de rendimentos">
          <i class="ph ph-file-text card-icon"></i>
          <span class="card-label">Informe de rendimentos</span>
        </div>

        <div class="quick-card" aria-label="Perguntas frequentes">
          <i class="ph ph-question card-icon"></i>
          <span class="card-label">Perguntas frequentes</span>
        </div>

        <div class="quick-card" aria-label="Ouvidoria">
          <i class="ph ph-user-circle card-icon"></i>
          <span class="card-label">Ouvidoria</span>
        </div>

      </div>
    </section>

  </main>

<script>
  const card = document.getElementById('card-financeiro');
  const msgEl = card.querySelector('.loading-msg');

  const messages = [
    'Verificando suas credenciais…',
    'Estabelecendo conexão segura…',
    'Quase lá, carregando suas faturas…',
  ];

  card.addEventListener('click', e => {
    e.preventDefault();
    card.classList.add('loading');

    let i = 0;
    msgEl.textContent = messages[i];

    const interval = setInterval(() => {
      i++;
      if (i < messages.length) {
        msgEl.style.animation = 'none';
        msgEl.offsetHeight;
        msgEl.style.animation = '';
        msgEl.textContent = messages[i];
      } else {
        clearInterval(interval);
      }
    }, 1066);

    setTimeout(() => {
      clearInterval(interval);
      window.location.href = 'Faturas.html';
    }, 3200);
  });
</script>
</body>
</html>
